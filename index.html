<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Mini-App</title>
    
    <!-- تمام استایل‌های اصلی، قالب لوکس و تیره اولیه شما -->
    <style>
        :root {
            --bg-color: #06090f;
            --card-bg: #121622;
            --border-color: #1a2235;
            --text-main: #ffffff;
            --text-sub: #8f98aa;
            --primary: #f7931a;
            --green: #00ff99;
            --red: #ff4a5a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .page {
            display: none;
            padding-bottom: 90px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* استایل کارت‌ها و ردیف‌های مارکت */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin: 12px 16px;
            padding: 16px;
        }

        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .coin-row:last-child {
            border-bottom: none;
        }

        .coin-row:hover {
            background: #161c2e;
        }

        .coin-symbol {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-main);
        }

        .coin-name {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* قالب شیک کادر جستجو */
        .search-container {
            padding: 16px 16px 4px 16px;
        }

        .search-box {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            text-align: center;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--primary);
        }

        /* قالب پاپ‌آپ چارت تریدینگ‌وی */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 9, 15, 0.98);
            z-index: 1000;
            flex-direction: column;
        }

        /* قالب منوی ناوبری لوکس پایین صفحه با دکمه مرکزی */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(18, 22, 34, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
        }

        .nav-item {
            color: var(--text-sub);
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
            font-weight: bold;
        }

        .center-btn {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #f7931a, #ff4a5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            margin-top: -25px;
            box-shadow: 0 4px 15px rgba(247, 147, 26, 0.4);
            cursor: pointer;
        }
    </style>
    
    <!-- اسکریپت‌های مورد نیاز وب‌اپ تلگرام و تریدینگ‌وی -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <!-- ========================================== -->
    <!-- ۱. صفحه مارکت (لیست ارزها و سرچ صرافی‌ها) -->
    <!-- ========================================== -->
    <div id="market-page" class="page active">
        <div style="display: flex; justify-content: space-around; background: var(--card-bg); padding: 14px; font-weight: bold; font-size: 13px; border-bottom: 1px solid var(--border-color); font-family: monospace;">
            <span id="btc" style="color: var(--primary);">₿ BTC: $00,000</span>
            <span id="eth" style="color: #627eea;">Ξ ETH: $0,000</span>
        </div>

        <div class="search-container">
            <input type="text" 
                   id="market-search" 
                   oninput="filterMarket()" 
                   placeholder="جستجوی ارز دیجیتال (مثلاً BTC, HYPE)..." 
                   class="search-box">
        </div>

        <div id="market-list"></div>
    </div>

    <!-- ========================================== -->
    <!-- ۲. صفحه اخبار فارسی کریپتو -->
    <!-- ========================================== -->
    <div id="news-page" class="page">
        <div style="padding: 20px 20px 0 20px; text-align: right; font-size: 20px; font-weight: bold; color: var(--primary);">📰 اخبار لایو بازار</div>
        <div id="news-list" style="margin-top: 10px;"></div>
    </div>

    <!-- ========================================== -->
    <!-- ۳. صفحه تحلیل‌های اختصاصی ربات -->
    <!-- ========================================== -->
    <div id="analysis-page" class="page">
        <div style="padding: 20px 20px 10px 20px; text-align: right; font-size: 20px; font-weight: bold; color: var(--primary);">🎯 سیگنال و تحلیل تکنیکال</div>
        <div id="telegram-feed-container" style="padding: 0 16px; margin-top: 10px;"></div>
    </div>

    <!-- ========================================== -->
    <!-- ۴. صفحه پروفایل لوکس کاربر تلگرام -->
    <!-- ========================================== -->
    <div id="profile-page" class="page">
        <div class="card" style="text-align: center; margin-top: 40px; padding: 30px 20px;">
            <div style="position: relative; display: inline-block;">
                <img id="profile-img" src="" onerror="this.src='https://img.icons8.com/clouds/100/000000/user.png'" style="width: 95px; height: 95px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover;">
            </div>
            <h3 id="user-name" style="margin: 18px 0 6px 0; font-size: 20px; color: var(--text-main);">کاربر تلگرام</h3>
            <p id="user-username" style="margin: 0; color: var(--text-sub); font-size: 14px;">@username</p>
            
            <div style="margin-top: 25px; border-top: 1px solid var(--border-color); padding-top: 20px; font-size: 13px; color: var(--text-sub); text-align: left; direction: ltr; font-family: monospace;">
                USER ID: <span id="user-id" style="color: var(--text-main); font-weight: bold;">00000000</span>
            </div>
        </div>
    </div>

    <!-- پاپ‌آپ تمام‌صفحه لود نمودار TradingView -->
    <div id="chart-modal" class="modal">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--border-color);">
            <button onclick="closeChart()" style="background: var(--red); border: none; color: white; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px;">بستن ✕</button>
            <span id="modal-coin-title" style="font-weight: bold; font-size: 16px; color: var(--text-main);">CHART</span>
        </div>
        <div id="tradingview-widget-container" style="flex: 1; width: 100%;"></div>
    </div>

    <!-- منوی شیک ناوبری پایینی کل برنامه -->
    <div class="navbar">
        <div class="nav-item active" onclick="showPage('market-page', this)">
            <span style="font-size: 20px;">📊</span><span>مارکت</span>
        </div>
        <div class="nav-item" onclick="showPage('news-page', this)">
            <span style="font-size: 20px;">📰</span><span>اخبار</span>
        </div>
        <div class="center-btn" onclick="showPage('market-page', document.querySelectorAll('.nav-item')[0])">📈</div>
        <div class="nav-item" onclick="showPage('analysis-page', this)">
            <span style="font-size: 20px;">🎯</span><span>تحلیل‌ها</span>
        </div>
        <div class="nav-item" onclick="showPage('profile-page', this)">
            <span style="font-size: 20px;">👤</span><span>پروفایل</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
