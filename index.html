<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Mini-App</title>
    <!-- استایل‌های پایه برنامه -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0f17;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        .page {
            display: none;
            padding-bottom: 80px;
        }
        .page.active {
            display: block;
        }
        .card {
            background: #121622;
            border: 1px solid #1a2235;
            border-radius: 12px;
            margin: 10px 15px;
            padding: 15px;
        }
        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 15px;
            border-bottom: 1px solid #1a2235;
            cursor: pointer;
            transition: background 0.2s;
        }
        .coin-row:hover {
            background: #161c2e;
        }
        /* استایل مودال چارت */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 9, 15, 0.95);
            z-index: 1000;
            flex-direction: column;
        }
        /* منوی ناوبری پایین صفحه */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: #121622;
            border-top: 1px solid #1a2235;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
        }
        .nav-item {
            color: #8f98aa;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            flex: 1;
        }
        .nav-item.active {
            color: #f7931a;
        }
    </style>
    <!-- بارگذاری اسکریپت وب‌اپ تلگرام -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- بارگذاری اسکریپت تریدینگ‌وی -->
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <!-- ========================================== -->
    <!-- ۱. صفحه اصلی مارکت و قیمت‌های زنده -->
    <!-- ========================================== -->
    <div id="market-page" class="page active">
        <!-- هدر قیمت‌های شاخص -->
        <div style="display: flex; justify-content: space-around; background: #121622; padding: 12px; font-weight: bold; font-size: 13px; border-bottom: 1px solid #1a2235;">
            <span id="btc" style="color: #f7931a;">₿ BTC: بارگذاری...</span>
            <span id="eth" style="color: #627eea;">Ξ ETH: بارگذاری...</span>
        </div>

        <!-- باکس فوق‌پیشرفته جستجوی لایو صرافی‌ها -->
        <div style="padding: 15px 15px 5px 15px;">
            <input type="text" 
                   id="market-search" 
                   oninput="filterMarket()" 
                   placeholder="جستجوی سریع ارزها (مثلاً BTC, HYPE)..." 
                   style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #1a2235; background: #121622; color: #fff; text-align: center; font-size: 14px; box-sizing: border-box; outline: none;">
        </div>

        <!-- لیست ارزهای دیجیتال -->
        <div id="market-list" style="margin-top: 10px;">
            <!-- ارزها به صورت پویا توسط جاوااسکریپت در اینجا رندر می‌شوند -->
        </div>
    </div>

    <!-- ========================================== -->
    <!-- ۲. صفحه اخبار ارزهای دیجیتال -->
    <!-- ========================================== -->
    <div id="news-page" class="page">
        <div style="padding: 15px 15px 0 15px; text-align: right; font-size: 18px; font-weight: bold;">📰 آخرین اخبار بازار</div>
        <div id="news-list" style="margin-top: 10px;"></div>
    </div>

    <!-- ========================================== -->
    <!-- ۳. صفحه تحلیل‌های تکنیکال و فاندامنتال -->
    <!-- ========================================== -->
    <div id="analysis-page" class="page">
        <div style="padding: 15px 15px 0 15px; text-align: right; font-size: 18px; font-weight: bold;">🎯 تحلیل‌های اختصاصی</div>
        <div id="analysis-list" style="margin-top: 10px;"></div>
    </div>

    <!-- ========================================== -->
    <!-- ۴. صفحه پروفایل کاربر تلگرام -->
    <!-- ========================================== -->
    <div id="profile-page" class="page">
        <div class="card" style="text-align: center; margin-top: 30px; padding: 25px 15px;">
            <img id="profile-img" src="" onerror="this.src='https://img.icons8.com/clouds/100/000000/user.png'" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid #f7931a; object-fit: cover;">
            <h3 id="user-name" style="margin: 15px 0 5px 0; font-size: 18px;">کاربر مهمان</h3>
            <p id="user-username" style="margin: 0; color: #8f98aa; font-size: 14px;">@guest</p>
            <div style="margin-top: 20px; border-top: 1px solid #1a2235; padding-top: 15px; font-size: 13px; color: #8f98aa; text-align: left; direction: ltr;">
                ID: <span id="user-id" style="color: #fff; font-weight: bold;">000000000</span>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- سیستم پاپ‌آپ (مودال) نمایش چارت تریدینگ‌وی -->
    <!-- ========================================== -->
    <div id="chart-modal" class="modal">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #121622; border-bottom: 1px solid #1a2235;">
            <button onclick="closeChart()" style="background: #ff4a5a; border: none; color: white; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer;">بستن ✕</button>
            <span id="modal-coin-title" style="font-weight: bold; font-size: 15px;">نمودار قیمت</span>
        </div>
        <div id="tradingview-widget-container" style="flex: 1; width: 100%;">
            <!-- ویجت چارت لوپ در این قسمت ساخته می‌شود -->
        </div>
    </div>

    <!-- ========================================== -->
    <!-- منوی سیستم ناوبری (تغییر صفحات) -->
    <!-- ========================================== -->
    <div class="navbar">
        <div class="nav-item active" onclick="showPage('market-page', this)">📊 مارکت</div>
        <div class="nav-item" onclick="showPage('news-page', this)">📰 اخبار</div>
        <div class="nav-item" onclick="showPage('analysis-page', this)">🎯 تحلیل‌ها</div>
        <div class="nav-item" onclick="showPage('profile-page', this)">👤 پروفایل</div>
    </div>

    <!-- بارگذاری کدهای منطقی برنامه -->
    <script src="app.js"></script>
</body>
</html>
