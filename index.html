<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Pro Dashboard</title>
    <style>
        :root {
            --bg-color: #04060a;
            --card-bg: rgba(18, 22, 34, 0.65);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-glow: rgba(247, 147, 26, 0.1);
            --text-main: #ffffff;
            --text-sub: #8a94a6;
            --primary: #f7931a;
            --primary-glow: rgba(247, 147, 26, 0.3);
            --green: #00ffaa;
            --red: #ff3355;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-color); background-image: radial-gradient(circle at 50% 0%, #16192b 0%, #04060a 70%); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; margin: 14px 16px; padding: 18px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .page { display: none; padding-bottom: 100px; animation: cubic-bezier(0.4, 0, 0.2, 1) fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .grid-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
        .grid-item { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 100px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--glass-border); cursor: pointer; }
        .search-container { padding: 16px 16px 4px 16px; }
        .search-box { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(18, 22, 34, 0.8); color: var(--text-main); text-align: center; font-size: 14px; box-sizing: border-box; outline: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 6, 10, 0.98); z-index: 1000; flex-direction: column; }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 74px; background: rgba(10, 14, 23, 0.75); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 999; }
        .nav-item { color: var(--text-sub); font-size: 11px; cursor: pointer; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .center-btn { width: 60px; height: 60px; background: linear-gradient(135deg, #f7931a, #ff3355); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; margin-top: -28px; cursor: pointer; }
        .index-value { font-size: 28px; font-weight: 800; font-family: monospace; line-height: 1; }
        .news-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; margin: 10px 16px; cursor: pointer; text-align: right; direction: rtl; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <div id="dashboard-page" class="page active">
        </div>

    <div id="market-page" class="page">
        </div>

    <div id="news-page" class="page">
        </div>

    <div id="analysis-page" class="page">
        </div>

    <div id="profile-page" class="page">
        </div>

    <div id="chart-modal" class="modal">
        <div style="display: flex; justify-content: space-between; padding: 15px; background: #0c0f17; border-bottom: 1px solid var(--glass-border);">
            <button onclick="closeChart()" style="background: var(--red); border:none; color:white; padding: 8px 16px; border-radius: 8px;">بستن ✕</button>
            <span id="modal-coin-title">CHART</span>
        </div>
        <div id="tradingview-widget-container" style="flex: 1; width: 100%;"></div>
    </div>

    <div id="news-modal" class="modal" style="z-index: 2000; direction: rtl; padding: 20px; overflow-y: auto;">
        <div style="background: #121622; border-radius: 20px; padding: 20px; border: 1px solid var(--glass-border);">
            <button onclick="closeNewsModal()" style="background: var(--red); border:none; padding:10px 20px; color:white; border-radius:10px; cursor:pointer;">بستن ✕</button>
            <h2 id="news-title-modal" style="color:white; margin:20px 0;"></h2>
            <div id="news-content-modal" style="color:#ddd; line-height:1.8;"></div>
        </div>
    </div>

    <div class="navbar">
        <div id="nav-market" class="nav-item" onclick="showPage('market-page', this)">
            <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:currentColor;"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
            <span>دیدبان</span>
        </div>
        <div id="nav-news" class="nav-item" onclick="showPage('news-page', this)">
            <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:currentColor;"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg>
            <span>اخبار</span>
        </div>
        <div id="nav-dashboard" class="center-btn" onclick="showPage('dashboard-page', null)">
            <svg viewBox="0 0 24 24" style="width:26px; height:26px; fill:white;"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div id="nav-analysis" class="nav-item" onclick="showPage('analysis-page', this)">
            <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:currentColor;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span>تحلیل‌ها</span>
        </div>
        <div id="nav-profile" class="nav-item" onclick="showPage('profile-page', this)">
            <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:currentColor;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>حساب</span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
