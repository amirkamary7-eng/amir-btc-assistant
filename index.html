<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Pro Dashboard</title>
    <style>
        :root { --bg-color: #04060a; --card-bg: rgba(18, 22, 34, 0.7); --glass-border: rgba(255, 255, 255, 0.08); --primary: #f7931a; --text-main: #ffffff; --text-sub: #94a3b8; }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .page { display: none; padding-bottom: 100px; }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin: 15px; }
        .grid-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .grid-item { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px; text-align: center; }
        
        /* ناوبری مدرن */
        .navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(10, 14, 23, 0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 999; }
        .nav-item { color: var(--text-sub); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .center-btn { width: 60px; height: 60px; background: linear-gradient(135deg, #f7931a, #ff3355); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -30px; box-shadow: 0 4px 15px rgba(247, 147, 26, 0.4); cursor: pointer; }
    </style>
</head>
<body>

    <!-- داشبورد -->
    <div id="dashboard-page" class="page active">
        <div style="padding: 20px;">
            <div style="font-size: 14px; color: var(--text-sub);">خوش آمدید</div>
            <div id="dash-user-name" style="font-size: 22px; font-weight: bold;">کاربر گرامی</div>
        </div>
        <div class="grid-dash">
            <div class="grid-item"><div>ترس و طمع</div><div id="fg-val" style="font-size: 22px; font-weight: bold; color: var(--primary);">--</div></div>
            <div class="grid-item"><div>لیکوئیدی</div><div id="liq-val" style="font-size: 22px; font-weight: bold; color: #ff3355;">--</div></div>
        </div>
    </div>

    <!-- سایر صفحات -->
    <div id="market-page" class="page"><div class="glass-card"><h3>لیست بازار</h3><div id="market-list"></div></div></div>
    <div id="news-page" class="page"><div class="glass-card"><h3>اخبار روز</h3><div id="news-list"></div></div></div>
    <div id="analysis-page" class="page"><div class="glass-card"><h3>تحلیل کانال @amir_btc_2024</h3><div id="telegram-feed-container"></div></div></div>
    
    <!-- پروفایل -->
    <div id="profile-page" class="page">
        <div class="glass-card" style="text-align: center;">
            <img id="profile-img" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary);">
            <h2 id="user-name" style="margin: 15px 0 5px;">...</h2>
            <p id="user-username" style="color: var(--text-sub);">@...</p>
            <div style="font-size: 13px; margin-top: 10px;">آیدی عددی: <span id="user-id">...</span></div>
            <button onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/amir_btc_2024')" style="background:var(--primary); border:none; padding:12px 25px; border-radius:12px; margin-top:20px; font-weight:bold; cursor:pointer; width:100%;">عضویت در کانال تحلیل</button>
        </div>
    </div>

    <!-- منو -->
    <div class="navbar">
        <div class="nav-item" onclick="showPage('market-page', this)">📊 بازار</div>
        <div class="nav-item" onclick="showPage('news-page', this)">📰 اخبار</div>
        <div class="center-btn" onclick="showPage('dashboard-page', this)">🏠</div>
        <div class="nav-item" onclick="showPage('analysis-page', this)">🎯 تحلیل</div>
        <div class="nav-item" onclick="showPage('profile-page', this)">👤 حساب</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
