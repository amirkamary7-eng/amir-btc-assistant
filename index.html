<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Pro Dashboard</title>
    
    <style>
        :root {
            --bg-color: #04060a;
            --card-bg: rgba(18, 22, 34, 0.65);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-glow: rgba(247, 147, 26, 0.1);
            --text-main: #ffffff;
            --text-sub: #8a94a6;
            --primary: #f7931a;
            --primary-glow: rgba(247, 147, 26, 0.3);
            --green: #00ffaa;
            --red: #ff3355;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #16192b 0%, #04060a 70%);
            color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden; -webkit-user-select: none; user-select: none;
        }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            margin: 14px 16px; padding: 18px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .page { display: none; padding-bottom: 100px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .grid-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
        .grid-item { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px; display: flex; flex-direction: column; min-height: 100px; }

        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--glass-border); cursor: pointer; }
        .search-container { padding: 16px 16px 4px 16px; }
        .search-box { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(18, 22, 34, 0.8); color: var(--text-main); text-align: center; box-sizing: border-box; outline: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 6, 10, 0.98); z-index: 1000; flex-direction: column; }
        
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 74px; background: rgba(10, 14, 23, 0.75); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 999; }
        .nav-item { color: var(--text-sub); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .nav-item.active { color: var(--primary); font-weight: 600; }
        .center-btn { width: 60px; height: 60px; background: linear-gradient(135deg, #f7931a, #ff3355); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; margin-top: -28px; cursor: pointer; }
        
        .index-value { font-size: 28px; font-weight: 800; font-family: monospace; }
        .news-card { background: rgba(18, 22, 34, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 18px; margin: 10px 16px; cursor: pointer; text-align: right; direction: rtl; }
    </style>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <div id="dashboard-page" class="page active">
        <div style="padding: 24px 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; direction: rtl;">
            <div>
                <div style="font-size: 13px; color: var(--text-sub);">خوش آمدید</div>
                <div id="dash-user-name" style="font-size: 18px; font-weight: bold; color: var(--text-main); margin-top: 4px;">کاربر گرامی</div>
            </div>
            <div style="font-family: monospace; font-size: 14px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--glass-border);">
                <span id="dash-btc-price" style="color: var(--primary); font-weight: bold;">BTC $--,--</span>
            </div>
        </div>

        <div class="glass-card" onclick="showPage('analysis-page', document.getElementById('nav-analysis'))" style="direction: rtl; background: linear-gradient(135deg, rgba(247,147,26,0.1), rgba(18,22,34,0.65));">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 12px; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 6px; font-weight: bold;">سیگنال زنده</span>
                <span style="font-size: 11px; color: var(--text-sub);">ورود به صفحه تحلیل‌ها 🎯</span>
            </div>
            <div style="font-size: 15px; font-weight: bold; margin-top: 12px; color: #fff;" id="dash-last-analysis-title">در حال بارگذاری تحلیل...</div>
        </div>

        <div class="grid-dashboard">
            <div class="grid-item" style="direction: rtl;">
                <span style="font-size: 12px; color: var(--text-sub);">ترس و طمع</span>
                <div id="fg-value" class="index-value" style="color: var(--green);">--</div>
                <div id="fg-status" style="font-size: 12px; color: var(--text-sub);">Loading...</div>
            </div>
            <div class="grid-item" style="direction: rtl;">
                <span style="font-size: 12px; color: var(--text-sub);">لیکوئیدی ۲۴ساعت</span>
                <div id="liq-value" class="index-value" style="color: var(--red); font-size: 22px;">$--M</div>
            </div>
        </div>

        <div class="glass-card" onclick="showPage('market-page', document.getElementById('nav-market'))" style="direction: rtl;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span style="font-weight: bold; font-size: 14px;">⚡ دیدبان سریع بازار</span>
            </div>
            <div id="dash-mini-market"></div>
        </div>
    </div>

    <div id="market-page" class="page">
        <div class="search-container">
            <input type="text" id="market-search" oninput="filterMarket()" placeholder="جستجوی پیشرفته..." class="search-box">
        </div>
        <div id="market-list" class="glass-card" style="padding: 0; overflow: hidden;"></div>
    </div>

    <div id="news-page" class="page">
        <div style="padding: 20px; font-weight: bold; color: var(--primary); text-align: right;">📰 آخرین اخبار</div>
        <div id="news-list"></div>
    </div>

    <div id="analysis-page" class="page">
        <div id="telegram-feed-container" style="padding: 10px;"></div>
    </div>

    <div id="profile-page" class="page" style="padding: 20px;">
        <div style="text-align: center; margin-top: 20px;">
            <img id="profile-img" src="https://via.placeholder.com/150" style="width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary);">
            <h2 id="user-name">---</h2>
            <p id="user-username" style="color:var(--text-sub);">---</p>
        </div>
    </div>

    <!-- مودال‌ها -->
    <div id="chart-modal" class="modal">
        <div style="display: flex; justify-content: space-between; padding: 15px; background: #0c0f17;">
            <button onclick="closeChart()" style="background: var(--red); border:none; color:white; padding: 8px 16px; border-radius: 8px;">بستن</button>
            <span id="modal-coin-title">CHART</span>
        </div>
        <div id="tradingview-widget-container" style="flex: 1; width: 100%;"></div>
    </div>

    <div id="news-modal" class="modal" style="z-index: 9999; flex-direction: column; padding: 20px; overflow-y: auto; text-align: right; direction: rtl;">
        <div style="background: #121622; border-radius: 20px; padding: 20px; border: 1px solid var(--glass-border);">
            <button onclick="closeNewsModal()" style="background: var(--red); border:none; padding:10px; color:white; border-radius:8px;">بستن ✕</button>
            <h2 id="news-title-modal" style="color:white; margin:20px 0;"></h2>
            <div id="news-content-modal" style="color:#ddd; line-height:1.8;"></div>
        </div>
    </div>

    <div class="navbar">
        <div id="nav-market" class="nav-item" onclick="showPage('market-page', this)"><span>دیدبان</span></div>
        <div id="nav-news" class="nav-item" onclick="showPage('news-page', this)"><span>اخبار</span></div>
        <div id="nav-dashboard" class="center-btn" onclick="showPage('dashboard-page', null)"><span>هوم</span></div>
        <div id="nav-analysis" class="nav-item" onclick="showPage('analysis-page', this)"><span>تحلیل</span></div>
        <div id="nav-profile" class="nav-item" onclick="showPage('profile-page', this)"><span>حساب</span></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
