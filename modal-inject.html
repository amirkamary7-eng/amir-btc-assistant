<div id="add-coin-modal" class="modal" style="display:none;" onclick="if(event.target===this) closeAddCoinModal()">
        <div class="glass-card" style="width:90%; max-width:500px; max-height:75vh; display:flex; flex-direction:column; padding:20px; position:relative;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0; color:white; font-size:16px; text-align:right; direction:rtl;">کوین جدید اضافه کن</h3>
                <button onclick="closeAddCoinModal()" style="background:none; border:none; color:#999; font-size:20px; cursor:pointer;">✕</button>
            </div>
            <input type="text" id="coin-search-input" placeholder="جستجو..." style="width:100%; padding:10px; border:1px solid rgba(255,255,255,0.1); border-radius:8px; background:rgba(255,255,255,0.05); color:white; margin-bottom:15px; box-sizing:border-box; direction:rtl;" oninput="filterAddCoinModal()">
            <div id="coin-list-modal" style="display:flex; flex-direction:column; gap:8px; overflow-y:auto; flex:1;"></div>
        </div>
    </div>

    <script src="watchlist.js"></script>
