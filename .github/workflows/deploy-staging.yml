# Deploy workflow

name: Deploy

on:
  push:
    branches: main
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".gitignore"

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    name: Run Worker Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Run worker tests
        run: npm test

  deploy:
    name: Deploy Worker + Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker (Staging)
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker (Production)
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build Pages
        run: npm run cf:pages:prepare
        env:
          WORKER_API_URL: https://amir-btc-assistant-api-production.amirkamari9939.workers.dev

      - name: Deploy Pages (Production)
        run: npx wrangler pages deploy ./webapp/pages-dist --project-name amir-btc-assistant-pages --production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Update WEBAPP_URL secret
        run: echo "https://amir-btc-assistant-pages.amirkamari9939.pages.dev" | npx wrangler secret put WEBAPP_URL --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
